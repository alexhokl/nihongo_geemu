version: "3"

tasks:
  build:
    desc: Build
    cmds:
      - task: mac
      - task: apk

  mac:
    desc: Build MacOS
    cmd: flutter build macos --dart-define=GIT_COMMIT=$(git rev-parse --short HEAD)

  apk:
    desc: Build APK
    cmd: flutter build apk --dart-define=GIT_COMMIT=$(git rev-parse --short HEAD)

  run:
    desc: Run on MacOS
    platforms: [darwin]
    cmd: open "./build/macos/Build/Products/Release/Nihongo Geemu.app"

  run-android:
    desc: Run on Android
    cmd: flutter devices --machine | jq -r '.[] | select(.targetPlatform | contains("android")) | .id' | head -n 1 | xargs flutter run -d --dart-define=GIT_COMMIT=$(git rev-parse --short HEAD)

  test:
    desc: Test
    cmd: flutter test --no-pub --coverage

  coverage:
    desc: Generate HTML of coverage and open in browser
    preconditions:
      - test -f coverage/lcov.info
      - sh: '[ ! -z "$(which genhtml)" ]'
    cmds:
      - genhtml coverage/lcov.info -o coverage/html
      - open coverage/html/index.html

  lint:
    desc: Lint
    cmd: dart fix --dry-run

  lint-fix:
    desc: Lint Fix
    cmd: dart fix --apply

  copy-apk-to-desktop:
    desc: Copy APK to Desktop
    platforms: [darwin]
    cmd: cp build/app/outputs/flutter-apk/app-release.apk ~/Desktop/nihongo_geemu.apk

  deploy-mac:
    desc: Deploy MacOS app locally
    platforms: [darwin]
    cmd: cp -r "build/macos/Build/Products/Release/Nihongo Geemu.app" /Applications/

  tag:
    desc: Create a new git tag with incremented patch version (0.1.x)
    silent: true
    cmds:
      - |
        LATEST=$(git tag --sort=-version:refname | grep -E '^0\.1\.[0-9]+$' | head -1)
        PATCH=$(echo "$LATEST" | cut -d. -f3)
        NEW_TAG="0.1.$((PATCH + 1))"
        git tag "$NEW_TAG"
        echo "Created tag $NEW_TAG"

  generate-apk-signing-key:
    desc: Generate a release keystore for APK signing
    vars:
      KEYSTORE_FILE: /tmp/nihongo_geemu_release.jks
      KEY_ALIAS: nihongo_geemu
    cmds:
      - |
        STORE_PASSWORD=$(gum input --password --prompt "Enter keystore password: ")
        keytool -genkey -v \
          -keystore {{.KEYSTORE_FILE}} \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias {{.KEY_ALIAS}} \
          -dname "CN=nihongo_geemu, OU=Mobile, O=alexho, L=HK, S=HK, C=HK" \
          -storepass "$STORE_PASSWORD" \
          -keypass "$STORE_PASSWORD"
        base64 -i {{.KEYSTORE_FILE}} -o {{.KEYSTORE_FILE}}.b64
        printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.jks\n' \
          "$STORE_PASSWORD" "$STORE_PASSWORD" {{.KEY_ALIAS}} \
          > /tmp/nihongo_geemu_key.properties
        echo "Keystore generated at {{.KEYSTORE_FILE}}"
        echo "key.properties generated at /tmp/nihongo_geemu_key.properties"
        echo "Run 'task upload-apk-signing-secrets' to upload to Secret Manager"

  upload-apk-signing-secrets:
    desc: Upload APK signing keystore and key.properties to GCP Secret Manager
    vars:
      KEYSTORE_FILE: /tmp/nihongo_geemu_release.jks
      GCP_PROJECT: craffy
    cmds:
      - gcloud secrets versions add nihongo-geemu-keystore --data-file={{.KEYSTORE_FILE}}.b64 --project={{.GCP_PROJECT}}
      - gcloud secrets versions add nihongo-geemu-key-properties --data-file=/tmp/nihongo_geemu_key.properties --project={{.GCP_PROJECT}}
      - rm {{.KEYSTORE_FILE}} {{.KEYSTORE_FILE}}.b64 /tmp/nihongo_geemu_key.properties
      - echo "Secrets uploaded and local files removed"
